<!doctype html>
<html lang="en">
  <head>
    <style>
      body.light-theme {
        background-color: #ffffff !important;
        color: #111111 !important;
      }

      body.dark-theme {
        background-color: #1a1a2e !important;
        color: #e0e0e0 !important;
      }

      body.dark-theme .navbar {
        background-color: #16213e !important;
      }

      body.dark-theme .nav-link,
      body.dark-theme .navbar-brand {
        color: #e0e0e0 !important;
      }

      body.dark-theme a.text-dark {
        color: #e0e0e0 !important;
      }

      body.dark-theme .card {
        background-color: #16213e !important;
        border-color: #2a2a4e !important;
      }

      body.dark-theme,
      body.dark-theme #root,
      body.dark-theme .container,
      body.dark-theme .container-fluid {
        background-color: #1a1a2e !important;
      }
      
      body.dark-theme,
      html {
        background-color: #1a1a2e;
      }

      body.dark-theme .container {
        background-color: #1a1a2e !important;
      }

      body.dark-theme .card {
        background-color: #16213e !important;
      }

/* Fix the text-dark link inside cards */
      body.dark-theme .text-dark {
        color: #e0e0e0 !important;
      }

/* Fix muted text */
      body.dark-theme .text-muted {
        color: #a0a0b0 !important;
      }

      body {
        margin: 0 !important;
        padding: 0 !important;
      }

      body.dark-theme .min-vh-100 {
        background-color: #1a1a2e !important;
      }

      /* Order table */
      body.dark-theme .table {
        color: #e0e0e0 !important;
        border-color: #2a2a4e !important;
      }

      body.dark-theme .table-light,
      body.dark-theme .table-hover > tbody > tr:hover {
        background-color: #1e2a4a !important;
        color: #e0e0e0 !important;
      }

      body.dark-theme .table-secondary {
        background-color: #1e2a4a !important;
        color: #e0e0e0 !important;
      }

      body.dark-theme .bg-light {
        background-color: #16213e !important;
        color: #e0e0e0 !important;
      }

      body.dark-theme .table td,
      body.dark-theme .table th {
        border-color: #2a2a4e !important;
      }

      body.dark-theme .table-info {
        background-color: #1a3a5c !important;
        color: #e0e0e0 !important;
      }

      body.dark-theme .card-body {
        background-color: #16213e !important;
      }

      body.dark-theme .card {
        background-color: #16213e !important;
        border-color: #2a2a4e !important;
      }

      body.dark-theme .table-hover > tbody > tr {
        background-color: #16213e !important;
        color: #e0e0e0 !important;
      }

      body.dark-theme .table,
      body.dark-theme .table > :not(caption) > * > * {
        background-color: #16213e !important;
        color: #e0e0e0 !important;
      }

    </style>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telusko E-Commerce</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>

    <!-- Main Entry Script -->
    <script type="module" src="/src/main.jsx"></script>

</html>
